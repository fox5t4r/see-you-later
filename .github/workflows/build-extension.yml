name: Build Extension

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: 의존성 설치
        run: npm ci
        working-directory: extension

      - name: 빌드
        run: npm run build
        working-directory: extension

      - name: 빌드 결과물 압축
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd extension/dist
          zip -r ../../see-you-later-${{ github.ref_name }}.zip .

      - name: GitHub Release 생성
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: see-you-later-${{ github.ref_name }}.zip
          body: |
            ## 설치 방법
            1. `see-you-later-${{ github.ref_name }}.zip` 다운로드 후 압축 해제
            2. `chrome://extensions` 접속
            3. 개발자 모드 활성화
            4. "압축 해제된 확장 프로그램을 로드합니다" 클릭 후 압축 해제된 폴더 선택
